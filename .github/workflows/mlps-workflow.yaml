
name: Mlops CI Workflow

on:
  workflow_dispatch:
    inputs:
      run_all:
        description: 'Run all jobs'
        required: false
        default: 'true'
      run_data_processing:
        description: 'Run data processing job'
        required: false
        default: 'false'
      run_model_training:
        description: 'Run model training job'
        required: false
        default: 'false'
      run_build_and_publish:
        description: 'Run build and publish job'
        required: false
        default: 'false'
  release:
    types: [created]
    branches: [main]
    tags: ['v*.*.*']


jobs:
  data_processing:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11.4'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: process data
      run: |
        python src/data_processing.py --input data/raw/house_data.csv --output data/processed/cleaned_house_data.csv

    - name: Engineer features
      run: |
        python src/feature_engineering.py --input data/processed/cleaned_house_data.csv --output data/processed/featured_house_data.csv

    - name: upload processed data
      uses: actions/upload-artifact@v4
      with:
        name: processed-data
        path: data/processed/featured_house_data.csv

    - name: upload preprocessor
      uses: actions/upload-artifact@v4
      with:
        name: preprocessor
        path: data/trained/preprocessor.pkl

  model_training:
    needs: data-processing
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.11.4'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Download processed data
      uses: actions/download-artifact@v4
      with:
        name: processed-data
        path: data/processed/

    - name: Setup MLflow
      run: |
        docker pull ghcr.io/mlflow/mlflow:latest
        docker run -d -p 5000:5000 --name mlflow-server ghcr.io/mlflow/mlflow:latest mlflow server --host 0.0.0.0 --backend-store-uri sqlite:///mlflow.db
      
    - name: wait for mlflow server
      run: |
        for i in {1..10}; do
          curl -f http://localhost:5000 || sleep 5}
        done

    - name: Train model
      run: |
        mkdir -p models
        python src/model/train_model.py --config configs/model_config.yaml --data data/processed/featured_house_data.csv --mlflow_uri http://localhost:5000

    - name: upload trained model
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: models/

    - name: cleanup mlflow server
      run: |
        docker stop mlflow-server || true
        docker rm mlflow-server || true

  build_and_publish:
    needs: model-training
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Download trained model
      uses: actions/download-artifact@v4
      with:
        name: trained-model
        path: models/
    
    - name: download preprocessor
      uses: actions/download-artifact@v4
      with:
        name: preprocessor
        path: models/trained/

    - name: set up docker buildx
      uses: docker/setup-buildx-action@v2

    - name: build and test docker image
      run: |
        COMMIT_HASH=$(echo ${{github.sha}} | cut -c1-7)
        docker build -t docker.io/${{vars.DOCKERHUB_USERNAME}}/house-price-model:$COMMIT_HASH -f Dockerfile .
        docker run -d -p 8000:8000 --name test-api docker.io/${{vars.DOCKERHUB_USERNAME}}/house-price-model:$COMMIT_HASH
        for i in {1..10}; do
          curl -f http://localhost:8000/health || sleep 5}
        done
        docker log test-api

    - name: cleanup test container
      run: |
        docker stop test-api || true
        docker rm test-api || true

    - name: login to github container registry
      uses: docker/login-action@v2
      with:
        registry: docker.io
        username: ${{vars.DOCKERHUB_USERNAME}}
        password: ${{secrets.DOCKERHUB_TOKEN}}

    - name: push docker image
      run: |
        COMMIT_HASH=$(echo ${{github.sha}} | cut -c1-7)
        docker tag docker.io/${{vars.DOCKERHUB_USERNAME}}/house-price-model:$COMMIT_HASH docker.io/${{vars.DOCKERHUB_USERNAME}}/house-price-model:latest
        docker push docker.io/${{vars.DOCKERHUB_USERNAME}}/house-price-model:$COMMIT_HASH
        docker push docker.io/${{vars.DOCKERHUB_USERNAME}}/house-price-model:latest